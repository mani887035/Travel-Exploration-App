server:
  port: 8080

spring:
  application:
    name: travel-app

  # H2 in-memory DB for development (switch to MySQL in production)
  datasource:
    url: jdbc:h2:mem:traveldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          facebook:
            client-id: ${FACEBOOK_APP_ID:your-facebook-app-id}
            client-secret: ${FACEBOOK_APP_SECRET:your-facebook-app-secret}
            scope:
              - email
              - public_profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  web:
    cors:
      allowed-origins: "*"

# Application specific config
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTSigningThatMustBeAtLeast256BitsLong!!SecureKey2024}
    expiration-ms: 900000        # 15 minutes
    refresh-expiration-ms: 604800000  # 7 days

  frontend-url: ${FRONTEND_URL:http://localhost:5500}

gemini:
  api:
    key: ${GEMINI_API_KEY:your-gemini-api-key}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

logging:
  level:
    com.travelapp: DEBUG
    org.springframework.security: WARN
