server:
  port: 8080

spring:
  application:
    name: travel-app

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

  # H2 in-memory DB for development (switch to MySQL in production)
  datasource:
    url: jdbc:h2:mem:traveldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  web:
    cors:
      allowed-origins: "*"

# Application specific config
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTSigningThatMustBeAtLeast256BitsLong!!SecureKey2024}
    expiration-ms: 900000        # 15 minutes
    refresh-expiration-ms: 604800000  # 7 days

  frontend-url: ${FRONTEND_URL:http://localhost:5500}

gemini:
  api:
    key: ${GEMINI_API_KEY:your-gemini-api-key}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

logging:
  level:
    com.travelapp: DEBUG
    org.springframework.security: INFO
