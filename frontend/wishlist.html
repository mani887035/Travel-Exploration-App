<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Wishlist — Wanderlust India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
</head>

<body class="dark-body">

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">✈️ Wanderlust India</a>
            <div class="nav-actions">
                <a href="index.html" class="nav-link">← Explore</a>

            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="wishlist-header">
            <h1 class="page-title">❤️ My Wishlist</h1>
            <span class="results-count" id="wishlist-count">0 places saved</span>
        </div>

        <!-- Empty State -->
        <div class="empty-state hidden" id="empty-state">
            <div class="empty-icon">🗺️</div>
            <h2>Your wishlist is empty</h2>
            <p>Start exploring destinations and save your favourites!</p>
            <a href="index.html" class="btn-primary"
                style="display:inline-block;text-decoration:none;padding:12px 32px">Explore Destinations</a>
        </div>

        <div class="destinations-grid" id="wishlist-grid"></div>
    </main>

    <script src="js/destinations_data.js"></script>
    <script src="js/image_data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/wishlist.js"></script>
</body>

</html>
